name: InsuOrders CI/CD

on:
  push:
    branches: [main, dev/NicolasSalas]
    tags:     ['v*']
  pull_request:
    branches: [main]

jobs:
  # ────────────────────────────────────────────────────────────────
  # JOB 1: Tests del backend (PHPUnit)
  # ────────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend — PHPUnit
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ''
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: insuban_test
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring, fileinfo, zip, gd
          coverage: xdebug

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: insuorders_private/vendor
          key: composer-${{ hashFiles('insuorders_private/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        working-directory: insuorders_private
        run: composer install --no-interaction --prefer-dist

      - name: Run unit tests
        working-directory: insuorders_private
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST || 'ci_test_secret_key_not_for_production_64chars' }}
          DB_HOST: 127.0.0.1
          DB_NAME: insuban_test
          DB_USER: root
          DB_PASS: ''
        run: composer test:unit

      - name: Upload coverage report
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: insuorders_private/coverage/
          retention-days: 7

  # ────────────────────────────────────────────────────────────────
  # JOB 2: Build del frontend (Vite)
  # ────────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend — Vite build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: public_html/package-lock.json

      - name: Install dependencies
        working-directory: public_html
        run: npm ci

      - name: Build
        working-directory: public_html
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: public_html/dist/
          retention-days: 1

  # ────────────────────────────────────────────────────────────────
  # JOB 3: Deploy a producción (solo en tags v*)
  # ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy → Producción
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring, fileinfo, zip, gd

      - name: Install backend deps (no dev)
        working-directory: insuorders_private
        run: composer install --no-interaction --prefer-dist --no-dev --optimize-autoloader

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: public_html/dist/

      - name: Deploy vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_KEY }}
          port:     ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            echo "→ Backup de la versión anterior..."
            cp -r public_html/dist public_html/dist.bak 2>/dev/null || true

            echo "→ Actualizando código..."
            git fetch --tags
            git checkout ${{ github.ref_name }}

            echo "→ Instalando dependencias PHP (prod)..."
            cd insuorders_private
            composer install --no-interaction --prefer-dist --no-dev --optimize-autoloader

            echo "→ Ejecutando migraciones pendientes..."
            # Agregar aquí el comando de migración cuando exista un runner de SQL
            # mysql -u$DB_USER -p$DB_PASS $DB_NAME < sql/A5_soft_delete.sql 2>/dev/null || true

            echo "→ Copiando frontend..."
            rsync -a --delete /tmp/dist/ public_html/dist/

            echo "✓ Deploy ${{ github.ref_name }} completado"

      - name: Notificar resultado
        if: always()
        run: |
          echo "Deploy de ${{ github.ref_name }}: ${{ job.status }}"
