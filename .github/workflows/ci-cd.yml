name: CI/CD

on:
  push:
    branches: [main, dev/NicolasSalas]
    tags: ['v*']
  pull_request:
    branches: [main, dev/NicolasSalas]

jobs:
  backend-tests:
    name: Backend — PHPUnit
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: insuban_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring, intl, gd, fileinfo
          tools: composer:v2
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ hashFiles('insuorders_private/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        working-directory: insuorders_private
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run PHPUnit
        working-directory: insuorders_private
        env:
          APP_ENV: testing
          JWT_SECRET: test_secret_key_for_phpunit_only
        run: vendor/bin/phpunit --testdox --testsuite=Unit

  frontend-build:
    name: Frontend — Vite build + Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: public_html/package-lock.json

      - name: Install dependencies
        working-directory: public_html
        run: npm install --no-audit --no-fund

      - name: Run frontend tests
        working-directory: public_html
        run: npm test

      - name: Build production bundle
        working-directory: public_html
        run: npm run build

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v5

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin main
            cd insuorders_private && composer install --no-dev --optimize-autoloader
            cd ../public_html && npm install && npm run build